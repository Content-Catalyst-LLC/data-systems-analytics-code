name: Cloud data platform architecture smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/cloud-data-platforms-and-modern-data-stack-architecture/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/cloud-data-platforms-and-modern-data-stack-architecture
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run platform scorecard and SQL loader
        run: |
          python3 python/platform_scorecard.py
          python3 sql/run_sqlite_architecture.py
      - name: Show manifest
        run: |
          cat outputs/platform_manifest_python.json
