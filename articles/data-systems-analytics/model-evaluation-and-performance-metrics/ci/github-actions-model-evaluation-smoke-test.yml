name: Model evaluation smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/model-evaluation-and-performance-metrics/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/model-evaluation-and-performance-metrics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run model evaluation scorecard and SQL loader
        run: |
          python3 python/model_evaluation_scorecard.py
          python3 sql/run_sqlite_model_evaluation.py
      - name: Show manifest
        run: |
          cat outputs/model_evaluation_manifest_python.json
