name: Data integration interoperability smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/data-integration-and-interoperability/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/data-integration-and-interoperability
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run interoperability scorecard and SQL loader
        run: |
          python3 python/interoperability_scorecard.py
          python3 sql/run_sqlite_interoperability.py
      - name: Show manifest
        run: |
          cat outputs/interoperability_manifest_python.json
