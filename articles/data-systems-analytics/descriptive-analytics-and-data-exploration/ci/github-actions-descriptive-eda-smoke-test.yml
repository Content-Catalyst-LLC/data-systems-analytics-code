name: Descriptive EDA smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/descriptive-analytics-and-data-exploration/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/descriptive-analytics-and-data-exploration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run descriptive EDA scorecard and SQL loader
        run: |
          python3 python/descriptive_eda_scorecard.py
          python3 sql/run_sqlite_descriptive_eda.py
      - name: Show manifest
        run: |
          cat outputs/descriptive_eda_manifest_python.json
