name: Reproducibility smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/reproducible-analytics-and-versioned-data-workflows/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/reproducible-analytics-and-versioned-data-workflows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run portable reproducible workflow
        run: |
          python3 python/reproducible_workflow.py --group-by system
          python3 sql/run_sqlite_workflow.py
      - name: Show outputs
        run: |
          ls -R outputs
          cat outputs/run_manifest_python.json
