name: Security privacy access control smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/data-security-privacy-and-access-control/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/data-security-privacy-and-access-control
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run security/privacy scorecard and SQL loader
        run: |
          python3 python/security_privacy_access_scorecard.py
          python3 sql/run_sqlite_security_privacy.py
      - name: Show manifest
        run: |
          cat outputs/security_privacy_access_manifest_python.json
