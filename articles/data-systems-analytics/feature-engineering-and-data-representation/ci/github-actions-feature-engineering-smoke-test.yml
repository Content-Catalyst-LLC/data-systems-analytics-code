name: Feature engineering smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/feature-engineering-and-data-representation/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/feature-engineering-and-data-representation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run feature engineering scorecard and SQL loader
        run: |
          python3 python/feature_engineering_scorecard.py
          python3 sql/run_sqlite_feature_engineering.py
      - name: Show manifest
        run: |
          cat outputs/feature_engineering_manifest_python.json
