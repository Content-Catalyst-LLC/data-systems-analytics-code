name: Streaming analytics smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/streaming-data-and-real-time-analytics/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/streaming-data-and-real-time-analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run streaming analytics scorecard and SQL loader
        run: |
          python3 python/streaming_analytics_scorecard.py
          python3 sql/run_sqlite_streaming_analytics.py
      - name: Show manifest
        run: |
          cat outputs/streaming_analytics_manifest_python.json
