name: Predictive analytics smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/predictive-analytics-and-machine-learning-models/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/predictive-analytics-and-machine-learning-models
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run predictive analytics scorecard and SQL loader
        run: |
          python3 python/predictive_model_scorecard.py
          python3 sql/run_sqlite_predictive_analytics.py
      - name: Show manifest
        run: |
          cat outputs/predictive_model_manifest_python.json
