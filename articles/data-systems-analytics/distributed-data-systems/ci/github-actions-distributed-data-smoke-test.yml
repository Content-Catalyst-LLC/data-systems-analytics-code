name: Distributed data systems smoke test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'articles/data-systems-analytics/distributed-data-systems/**'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: articles/data-systems-analytics/distributed-data-systems
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run distributed data scorecard and SQL loader
        run: |
          python3 python/distributed_data_scorecard.py
          python3 sql/run_sqlite_distributed_data.py
      - name: Show manifest
        run: |
          cat outputs/distributed_data_manifest_python.json
